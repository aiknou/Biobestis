; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; ── Shared settings ──────────────────────────────────────────────────────────
[common]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_filters = send_on_enter
upload_speed = 115200

; ── Receiver (display device) ────────────────────────────────────────────────
[env:receiver]
platform = ${common.platform}
framework = ${common.framework}
board = seeed_xiao_esp32c3
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
upload_speed = ${common.upload_speed}
build_src_filter = -<*> +<receiver/> +<shared/>
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.16

; ── Transmitter (sensor device) ──────────────────────────────────────────────
[env:transmitter]dity 10

platform = ${common.platform}
framework = ${common.framework}
board = seeed_xiao_esp32c3  ; TODO: change if the transmitter is a different board
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
upload_speed = ${common.upload_speed}
build_src_filter = -<*> +<transmitter/> +<shared/>
lib_deps =
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
